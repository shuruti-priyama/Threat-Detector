<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Threat Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0e14;
      --surface: #13181f;
      --border: #1f2a36;
      --accent: #00e5ff;
      --accent2: #ff4b6e;
      --text: #c9d6e3;
      --text-dim: #5a6a7a;
      --safe: #00e676;
      --danger: #ff4b6e;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(0,229,255,.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 680px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 48px; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,229,255,.08);
      border: 1px solid rgba(0,229,255,.2);
      border-radius: 99px;
      padding: 4px 14px;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--accent);
      letter-spacing: .08em;
      margin-bottom: 20px;
    }
    .badge span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.8s infinite; }

    h1 {
      font-family: var(--sans);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -.02em;
    }
    h1 em { font-style: normal; color: var(--accent); }

    .sub {
      margin-top: 12px;
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--text-dim);
      letter-spacing: .04em;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .5;
    }

    /* ── Tab switcher ── */
    .tabs {
      display: flex;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: .8rem;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .04em;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* ── Form elements ── */
    label {
      display: block;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--text-dim);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .85rem;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color .2s;
      line-height: 1.6;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-dim); }

    .detect-btn {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .detect-btn:hover { background: #33eaff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,255,.2); }
    .detect-btn:active { transform: translateY(0); }
    .detect-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Result ── */
    .result {
      margin-top: 24px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: slideIn .3s ease;
      display: none;
    }
    .result.show { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      font-family: var(--mono);
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .result-header .dot { width: 8px; height: 8px; border-radius: 50%; }

    .result-body { padding: 18px; }

    .result-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: flex-start;
    }
    .result-row:last-child { margin-bottom: 0; }

    .result-key {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--text-dim);
      letter-spacing: .06em;
      text-transform: uppercase;
      min-width: 120px;
      padding-top: 2px;
    }

    .result-val {
      font-family: var(--mono);
      font-size: .85rem;
      color: var(--text);
      word-break: break-all;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 12px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .pill.safe    { background: rgba(0,230,118,.12); color: var(--safe); border: 1px solid rgba(0,230,118,.2); }
    .pill.danger  { background: rgba(255,75,110,.12); color: var(--danger); border: 1px solid rgba(255,75,110,.2); }
    .pill.neutral { background: rgba(255,255,255,.05); color: var(--text); border: 1px solid var(--border); }

    .status-safe   { background: rgba(0,230,118,.08); }
    .status-danger { background: rgba(255,75,110,.08); }
    .status-safe   .dot { background: var(--safe); }
    .status-danger .dot { background: var(--danger); }

    .error-box {
      margin-top: 20px;
      padding: 14px 18px;
      background: rgba(255,75,110,.08);
      border: 1px solid rgba(255,75,110,.25);
      border-radius: 10px;
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--danger);
      display: none;
    }
    .error-box.show { display: block; }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      text-align: center;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--text-dim);
      letter-spacing: .06em;
    }

    /* ── Animations ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="badge"><span></span> AI-POWERED ANALYSIS</div>
      <h1>Threat <em>Detection</em><br/>Engine</h1>
      <p class="sub">// Analyse URLs & emails for malicious intent</p>
    </header>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" id="tab-url" onclick="switchTab('url')">🔗 URL</button>
        <button class="tab-btn"        id="tab-email" onclick="switchTab('email')">✉️ Email</button>
      </div>

      <label id="input-label">Enter a URL to analyse</label>
      <textarea id="userInput" placeholder="https://example.com" rows="5"></textarea>

      <button class="detect-btn" id="detectBtn" onclick="detect()">
        <span>Analyse</span>
      </button>

      <div class="error-box" id="errorBox"></div>
      <div class="result"    id="resultBox"></div>
    </div>

    <footer>© 2025 AI Threat Detection Project</footer>
  </div>

  <script>
    const API = 'http://127.0.0.1:5000';
    let currentTab = 'url';

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-url').classList.toggle('active', tab === 'url');
      document.getElementById('tab-email').classList.toggle('active', tab === 'email');
      document.getElementById('input-label').textContent =
        tab === 'url' ? 'Enter a URL to analyse' : 'Paste email content';
      document.getElementById('userInput').placeholder =
        tab === 'url' ? 'https://example.com' : 'Subject: You have won...\n\nDear user, click here to claim your prize...';
      document.getElementById('userInput').value = '';
      hide('resultBox'); hide('errorBox');
    }

    function show(id, cls) {
      const el = document.getElementById(id);
      el.style.display = '';
      el.classList.add('show');
      if (cls) el.classList.add(cls);
    }
    function hide(id) {
      const el = document.getElementById(id);
      el.classList.remove('show');
    }

    function setLoading(on) {
      const btn = document.getElementById('detectBtn');
      btn.disabled = on;
      btn.innerHTML = on
        ? '<div class="spinner"></div><span>Analysing…</span>'
        : '<span>Analyse</span>';
    }

    function isSafe(status) {
      return status && (status.includes('SAFE') || status.toLowerCase() === 'benign');
    }

    function renderResult(data, type) {
      const box  = document.getElementById('resultBox');
      const safe = type === 'url' ? isSafe(data.classification) : isSafe(data.threat_status);
      const cls  = safe ? 'status-safe' : 'status-danger';
      const label = safe ? 'SAFE' : 'THREAT DETECTED';

      let rows = '';

      if (type === 'url') {
        rows = `
          <div class="result-row">
            <span class="result-key">URL</span>
            <span class="result-val">${escHtml(data.url)}</span>
          </div>
          <div class="result-row">
            <span class="result-key">Classification</span>
            <span class="result-val">
              <span class="pill ${safe ? 'safe' : 'danger'}">${safe ? '✓ Benign' : '✗ Malicious'}</span>
            </span>
          </div>`;
      } else {
        const clusterSafe = data.cluster_type === 'benign-like';
        rows = `
          <div class="result-row">
            <span class="result-key">Threat Status</span>
            <span class="result-val">
              <span class="pill ${safe ? 'safe' : 'danger'}">${safe ? '✓ Safe' : '✗ Malicious'}</span>
            </span>
          </div>
          <div class="result-row">
            <span class="result-key">Cluster</span>
            <span class="result-val">
              <span class="pill ${clusterSafe ? 'safe' : 'danger'}">Cluster ${data.cluster_label} — ${data.cluster_type}</span>
            </span>
          </div>`;
      }

      box.className = `result show ${cls}`;
      box.innerHTML = `
        <div class="result-header ${cls}">
          <div class="dot"></div>
          ANALYSIS COMPLETE — ${label}
        </div>
        <div class="result-body">${rows}</div>`;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function detect() {
      const text = document.getElementById('userInput').value.trim();
      hide('resultBox'); hide('errorBox');

      if (!text) {
        const eb = document.getElementById('errorBox');
        eb.textContent = '⚠ Please enter some input first.';
        eb.classList.add('show');
        return;
      }

      setLoading(true);

      const endpoint = currentTab === 'url' ? '/classify-url' : '/check-email';
      const payload  = currentTab === 'url' ? { url: text } : { email_text: text };

      try {
        const res  = await fetch(API + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        renderResult(data, currentTab);
      } catch (err) {
        const eb = document.getElementById('errorBox');
        eb.textContent = `❌ ${err.message}. Make sure the Flask server is running on port 5000.`;
        eb.classList.add('show');
      } finally {
        setLoading(false);
      }
    }

    // Allow Ctrl+Enter to submit
    document.getElementById('userInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) detect();
    });
  </script>
</body>
</html>
